<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>РФ Регионы — Новостной дашборд</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;800&family=Geologica:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2236;
    --border: #1e2d45;
    --accent: #e63946;
    --accent2: #457b9d;
    --gold: #f4a261;
    --text: #e8eaf0;
    --text-dim: #8899aa;
    --text-muted: #4a5568;
    --success: #52b788;
    --map-fill: #1e3a5f;
    --map-hover: #2d5a8e;
    --map-active: #e63946;
    --glow: rgba(230,57,70,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Geologica', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.4;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 32px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-flag {
    width: 36px;
    height: 24px;
    display: flex;
    flex-direction: column;
    border-radius: 3px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  }
  .logo-flag span { flex: 1; }
  .logo-flag span:nth-child(1) { background: #fff; }
  .logo-flag span:nth-child(2) { background: #0039a6; }
  .logo-flag span:nth-child(3) { background: #d52b1e; }

  .logo-text {
    font-family: 'Unbounded', sans-serif;
    font-size: 14px;
    font-weight: 800;
    letter-spacing: 0.1em;
    color: var(--text);
  }
  .logo-text span { color: var(--accent); }

  .header-meta {
    display: flex;
    align-items: center;
    gap: 20px;
    font-size: 12px;
    color: var(--text-dim);
  }

  .live-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(230,57,70,0.1);
    border: 1px solid rgba(230,57,70,0.3);
    border-radius: 20px;
    padding: 4px 12px;
    font-family: 'Unbounded', sans-serif;
    font-size: 10px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.1em;
  }

  .live-dot {
    width: 7px;
    height: 7px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  #clock {
    font-family: 'Unbounded', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
  }

  .refresh-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 16px;
    color: var(--text-dim);
    font-family: 'Geologica', sans-serif;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .refresh-btn:hover { border-color: var(--accent2); color: var(--text); }

  /* ── LAYOUT ── */
  .layout {
    display: grid;
    grid-template-columns: 320px 1fr 300px;
    grid-template-rows: auto 1fr;
    height: calc(100vh - 61px);
    gap: 0;
  }

  /* ── LEFT SIDEBAR: Regions list ── */
  .sidebar-left {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .sidebar-title {
    font-family: 'Unbounded', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  .region-count {
    background: var(--accent);
    color: #fff;
    font-family: 'Unbounded', sans-serif;
    font-size: 10px;
    font-weight: 600;
    border-radius: 10px;
    padding: 2px 8px;
  }

  .search-box {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
  }

  .search-box input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    color: var(--text);
    font-family: 'Geologica', sans-serif;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-box input:focus { border-color: var(--accent2); }
  .search-box input::placeholder { color: var(--text-muted); }

  .regions-list {
    overflow-y: auto;
    flex: 1;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .federal-district {
    padding: 8px 16px 4px;
    font-family: 'Unbounded', sans-serif;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.15em;
    color: var(--text-muted);
    text-transform: uppercase;
    border-top: 1px solid var(--border);
    margin-top: 4px;
  }

  .region-item {
    display: flex;
    align-items: center;
    padding: 8px 16px;
    cursor: pointer;
    transition: all 0.15s;
    gap: 10px;
    border-left: 3px solid transparent;
  }

  .region-item:hover {
    background: var(--surface2);
    border-left-color: var(--accent2);
  }

  .region-item.active {
    background: rgba(230,57,70,0.08);
    border-left-color: var(--accent);
  }

  .region-indicator {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
    background: var(--text-muted);
  }

  .region-item.has-news .region-indicator {
    background: var(--success);
    box-shadow: 0 0 6px rgba(82,183,136,0.5);
  }

  .region-name {
    font-size: 13px;
    font-weight: 400;
    flex: 1;
    color: var(--text);
    line-height: 1.3;
  }

  .region-news-count {
    font-family: 'Unbounded', sans-serif;
    font-size: 10px;
    font-weight: 600;
    color: var(--text-muted);
    background: var(--surface2);
    border-radius: 8px;
    padding: 2px 7px;
    min-width: 24px;
    text-align: center;
  }

  .region-item.has-news .region-news-count {
    background: rgba(82,183,136,0.12);
    color: var(--success);
  }

  /* ── CENTER: Map + News Feed ── */
  .center-panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg);
  }

  .map-container {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: relative;
    overflow: hidden;
    height: 340px;
    flex-shrink: 0;
  }

  .map-container svg {
    width: 100%;
    height: 100%;
  }

  .map-overlay-text {
    position: absolute;
    top: 12px;
    left: 16px;
    font-family: 'Unbounded', sans-serif;
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.1em;
  }

  .news-feed-area {
    flex: 1;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .feed-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
  }

  .feed-title {
    font-family: 'Unbounded', sans-serif;
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
  }

  .feed-filter {
    display: flex;
    gap: 6px;
  }

  .filter-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    font-family: 'Geologica', sans-serif;
    font-size: 11px;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.2s;
  }

  .filter-btn.active, .filter-btn:hover {
    background: rgba(230,57,70,0.1);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* ── NEWS CARDS ── */
  .news-cards {
    padding: 16px 24px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .news-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .news-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent2);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .news-card:hover {
    border-color: var(--accent2);
    background: var(--surface2);
    transform: translateX(2px);
  }

  .news-card:hover::before { opacity: 1; }

  .news-card.gov::before { background: var(--gold); }
  .news-card.gov:hover { border-color: var(--gold); }

  .news-card.tg::before { background: #2aabee; }
  .news-card.tg:hover { border-color: #2aabee; }

  .card-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 7px;
  }

  .source-badge {
    font-family: 'Unbounded', sans-serif;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.08em;
    padding: 2px 8px;
    border-radius: 4px;
    text-transform: uppercase;
  }

  .source-badge.media { background: rgba(69,123,157,0.2); color: var(--accent2); }
  .source-badge.gov { background: rgba(244,162,97,0.15); color: var(--gold); }
  .source-badge.tg { background: rgba(42,171,238,0.15); color: #2aabee; }

  .card-region {
    font-size: 11px;
    color: var(--text-muted);
  }

  .card-time {
    margin-left: auto;
    font-size: 11px;
    color: var(--text-muted);
    font-family: 'Unbounded', sans-serif;
  }

  .card-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.45;
    margin-bottom: 6px;
  }

  .card-source-name {
    font-size: 11px;
    color: var(--text-muted);
  }

  .loading-state {
    padding: 40px 24px;
    text-align: center;
    color: var(--text-muted);
  }

  .spinner {
    width: 32px;
    height: 32px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-size: 13px;
    font-family: 'Geologica', sans-serif;
  }

  /* ── RIGHT SIDEBAR: RSS Sources + TG ── */
  .sidebar-right {
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
  }

  .tab {
    flex: 1;
    padding: 14px;
    font-family: 'Unbounded', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-align: center;
    cursor: pointer;
    color: var(--text-muted);
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }

  .tab.active {
    color: var(--text);
    border-bottom-color: var(--accent);
  }

  .tab-content {
    display: none;
    flex: 1;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .tab-content.active { display: block; }

  /* Sources list */
  .source-category {
    padding: 12px 16px 6px;
    font-family: 'Unbounded', sans-serif;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.15em;
    color: var(--text-muted);
    text-transform: uppercase;
    border-top: 1px solid var(--border);
  }

  .source-item {
    display: flex;
    align-items: center;
    padding: 9px 16px;
    gap: 10px;
    cursor: pointer;
    transition: background 0.15s;
    border-left: 3px solid transparent;
  }

  .source-item:hover {
    background: var(--surface2);
  }

  .source-item.enabled {
    border-left-color: var(--success);
  }

  .source-icon {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    flex-shrink: 0;
  }

  .source-icon.media { background: rgba(69,123,157,0.2); }
  .source-icon.gov { background: rgba(244,162,97,0.15); }
  .source-icon.tg { background: rgba(42,171,238,0.12); }

  .source-info { flex: 1; min-width: 0; }

  .source-item-name {
    font-size: 12px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .source-item-region {
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 1px;
  }

  .toggle {
    width: 32px;
    height: 18px;
    background: var(--border);
    border-radius: 9px;
    position: relative;
    cursor: pointer;
    flex-shrink: 0;
    transition: background 0.2s;
  }

  .toggle::after {
    content: '';
    position: absolute;
    width: 12px;
    height: 12px;
    background: var(--text-muted);
    border-radius: 50%;
    top: 3px;
    left: 3px;
    transition: all 0.2s;
  }

  .toggle.on {
    background: rgba(82,183,136,0.3);
  }

  .toggle.on::after {
    background: var(--success);
    transform: translateX(14px);
  }

  /* TG Feed */
  .tg-item {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.15s;
  }

  .tg-item:hover { background: var(--surface2); }

  .tg-channel {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }

  .tg-avatar {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: linear-gradient(135deg, #2aabee, #007ab8);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 600;
    color: #fff;
    flex-shrink: 0;
    font-family: 'Unbounded', sans-serif;
  }

  .tg-channel-name {
    font-size: 12px;
    font-weight: 500;
    color: #2aabee;
    flex: 1;
  }

  .tg-time {
    font-size: 10px;
    color: var(--text-muted);
  }

  .tg-text {
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* ── REGION DETAIL MODAL ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(6px);
    z-index: 500;
    display: none;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.show { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    width: 720px;
    max-width: 90vw;
    max-height: 80vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    animation: slideUp 0.3s ease;
  }

  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
  }

  .modal-region-name {
    font-family: 'Unbounded', sans-serif;
    font-size: 18px;
    font-weight: 700;
  }

  .modal-close {
    width: 32px;
    height: 32px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-dim);
    font-size: 18px;
    transition: all 0.2s;
  }

  .modal-close:hover { background: var(--accent); color: #fff; }

  .modal-body {
    padding: 24px;
    overflow-y: auto;
    flex: 1;
  }

  .modal-news-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .modal-news-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    text-decoration: none;
    display: block;
    transition: border-color 0.2s;
  }

  .modal-news-item:hover {
    border-color: var(--accent2);
  }

  .modal-news-title {
    font-size: 14px;
    color: var(--text);
    font-weight: 500;
    margin-bottom: 6px;
    line-height: 1.45;
  }

  .modal-news-meta {
    font-size: 11px;
    color: var(--text-muted);
    display: flex;
    gap: 12px;
  }

  /* ── STATUS BAR ── */
  .status-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 6px 24px;
    display: flex;
    align-items: center;
    gap: 20px;
    font-size: 11px;
    color: var(--text-muted);
    z-index: 200;
  }

  .status-item {
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
  }

  .status-dot.ok { background: var(--success); }
  .status-dot.warn { background: var(--gold); }
  .status-dot.err { background: var(--accent); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

  /* ── MAP SVG styles ── */
  .rf-map path, .rf-map rect, .rf-map polygon {
    fill: var(--map-fill);
    stroke: #0d1626;
    stroke-width: 0.5;
    transition: fill 0.2s;
    cursor: pointer;
  }

  .rf-map path:hover, .rf-map rect:hover, .rf-map polygon:hover {
    fill: var(--map-hover);
  }

  .rf-map path.active, .rf-map rect.active, .rf-map polygon.active {
    fill: var(--map-active);
    filter: drop-shadow(0 0 6px rgba(230,57,70,0.5));
  }

  /* ── ERROR / EMPTY ── */
  .empty-state {
    padding: 32px;
    text-align: center;
    color: var(--text-muted);
    font-size: 13px;
    line-height: 1.6;
  }

  .empty-state h3 {
    font-family: 'Unbounded', sans-serif;
    font-size: 14px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  /* ── Fade in animation ── */
  .news-card {
    animation: fadeIn 0.3s ease both;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Staggered cards */
  .news-card:nth-child(1) { animation-delay: 0.05s; }
  .news-card:nth-child(2) { animation-delay: 0.10s; }
  .news-card:nth-child(3) { animation-delay: 0.15s; }
  .news-card:nth-child(4) { animation-delay: 0.20s; }
  .news-card:nth-child(5) { animation-delay: 0.25s; }
  .news-card:nth-child(n+6) { animation-delay: 0.30s; }

  @media (max-width: 1200px) {
    .layout { grid-template-columns: 260px 1fr 260px; }
  }

  @media (max-width: 900px) {
    .layout { grid-template-columns: 1fr; grid-template-rows: auto; height: auto; }
    .sidebar-left { height: 200px; }
    .sidebar-right { height: 300px; }
    .map-container { height: 220px; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <div class="logo-flag">
      <span></span><span></span><span></span>
    </div>
    <div class="logo-text">РФ<span>·</span>РЕГИОНЫ</div>
  </div>
  <div class="header-meta">
    <div class="live-badge"><div class="live-dot"></div>LIVE</div>
    <div id="clock">--:--:--</div>

// ═══════════════════════════════════════════════
// CLOCK
// ═══════════════════════════════════════════════
function startClock() {
  const el = document.getElementById("clock");
  function tick() {
    const now = new Date();
    el.textContent = now.toLocaleTimeString("ru-RU", { timeZone: "Europe/Moscow" }) + " МСК";
  }
  tick();
  setInterval(tick, 1000);
}

// ═══════════════════════════════════════════════
// REGIONS LIST
// ═══════════════════════════════════════════════
function renderRegionsList(filter = "") {
  const container = document.getElementById("regions-list");
  container.innerHTML = "";

  let currentDistrict = null;
  const filtered = REGIONS.filter(r =>
    !filter || r.name.toLowerCase().includes(filter.toLowerCase())
  );

  filtered.forEach(region => {
    if (region.district !== currentDistrict) {
      currentDistrict = region.district;
      const header = document.createElement("div");
      header.className = "federal-district";
      header.textContent = FEDERAL_DISTRICTS[currentDistrict];
      container.appendChild(header);
    }

    const newsCount = allNews.filter(n => n.regionId === region.id).length;
    const item = document.createElement("div");
    item.className = `region-item${newsCount > 0 ? " has-news" : ""}${activeRegion === region.id ? " active" : ""}`;
    item.dataset.regionId = region.id;
    item.innerHTML = `
      <div class="region-indicator"></div>
      <div class="region-name">${region.name}</div>
      <div class="region-news-count">${newsCount || "—"}</div>
    `;
    item.onclick = () => selectRegion(region.id);
    container.appendChild(item);
  });
}

function filterRegions(val) {
  renderRegionsList(val);
}

// ═══════════════════════════════════════════════
// MAP HANDLERS
// ═══════════════════════════════════════════════
function setupMapHandlers() {
  const paths = document.querySelectorAll("#rf-map [data-district]");
  paths.forEach(path => {
    path.addEventListener("click", () => {
      const district = path.dataset.district;
      // highlight
      paths.forEach(p => p.classList.remove("active"));
      path.classList.add("active");
      // show district news
      const districtName = FEDERAL_DISTRICTS[district];
      document.getElementById("feed-title").textContent = `${districtName} — лента новостей`;
      renderNewsCards(allNews.filter(n => {
        const region = REGIONS.find(r => r.id === n.regionId);
        return region && region.district === district;
      }));
    });
    path.addEventListener("dblclick", () => {
      // Reset to all
      paths.forEach(p => p.classList.remove("active"));
      document.getElementById("feed-title").textContent = "Все регионы — лента новостей";
      renderNewsCards(allNews);
    });
  });
}

// ═══════════════════════════════════════════════
// SELECT REGION
// ═══════════════════════════════════════════════
function selectRegion(regionId) {
  activeRegion = regionId;
  const region = REGIONS.find(r => r.id === regionId);
  if (!region) return;

  const regionNews = allNews.filter(n => n.regionId === regionId);

  document.getElementById("modal-region-name").textContent = region.name;
  document.getElementById("modal-region-district").textContent = FEDERAL_DISTRICTS[region.district];

  const list = document.getElementById("modal-news-list");
  if (regionNews.length === 0) {
    list.innerHTML = `<div class="empty-state"><h3>Нет свежих новостей</h3><p>Нет данных за последние 24 часа или источники недоступны</p></div>`;
  } else {
    list.innerHTML = regionNews.map(n => `
      <a class="modal-news-item" href="${n.link || '#'}" target="_blank" rel="noopener">
        <div class="modal-news-title">${n.title}</div>
        <div class="modal-news-meta">
          <span>${n.source}</span>
          <span>${formatTime(n.pubDate)}</span>
        </div>
      </a>
    `).join("");
  }

  document.getElementById("modal-overlay").classList.add("show");
  renderRegionsList();
}

function closeModal(force) {
  if (force === true || force.target === document.getElementById("modal-overlay")) {
    document.getElementById("modal-overlay").classList.remove("show");
  }
}

// ═══════════════════════════════════════════════
// RSS LOADING
// ═══════════════════════════════════════════════
const RSS_PROXY = "https://api.rss2json.com/v1/api.json?rss_url=";
const RSS_PROXY2 = "https://api.allorigins.win/get?url=";

async function fetchRSS(source) {
  try {
    const url = `${RSS_PROXY}${encodeURIComponent(source.url)}&count=20`;
    const resp = await fetch(url, { signal: AbortSignal.timeout(8000) });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    if (data.status !== "ok") throw new Error(data.message || "RSS error");

    const now = Date.now();
    const cutoff = now - 24 * 60 * 60 * 1000;

    return (data.items || [])
      .filter(item => {
        const t = new Date(item.pubDate).getTime();
        return t > cutoff && t <= now;
      })
      .map(item => ({
        id: `${source.id}_${item.guid || item.link}`,
        title: stripHtml(item.title || ""),
        link: item.link || "",
        pubDate: item.pubDate,
        source: source.name,
        sourceId: source.id,
        type: source.type,
        regionId: guessRegionFromSource(source),
        region: source.region,
      }));
  } catch (e) {
    console.warn(`[RSS] Failed ${source.name}:`, e.message);
    return [];
  }
}

function guessRegionFromSource(source) {
  const regionMap = {
    "msk_m":  "msk", "kremlin": "msk",
    "spb_m":  "spb", "spb_g":  "spb",
    "nnov_m": "nnov",
    "ekb_m":  "ekb",
    "nvs_m":  "nvs",
    "krd_m":  "krd", "krd_g":  "krd",
    "ros_m":  "ros",
    "tat_m":  "tat", "tat_g":  "tat",
    "bas_m":  "bas",
    "krk_m":  "krk",
    "irk_m":  "irkutsk",
    "ykt_m":  "ykt",
    "kha_m":  "kha",
    "pri_m":  "pri",
    "dag_m":  "dag",
    "che_g":  "che",
    "kam_m":  "kam",
    "sakh_m": "sakh",
  };
  return regionMap[source.id] || null;
}

async function loadAllFeeds() {
  const active = RSS_SOURCES.filter(s => enabledSources.has(s.id));
  document.getElementById("status-rss").textContent = `RSS: загрузка ${active.length} источников...`;
  document.getElementById("news-cards").innerHTML = `<div class="loading-state"><div class="spinner"></div><div class="loading-text">Загрузка новостей из ${active.length} источников...</div></div>`;

  const results = await Promise.allSettled(active.map(s => fetchRSS(s)));

  allNews = [];
  let loaded = 0;
  results.forEach((r, i) => {
    if (r.status === "fulfilled" && r.value.length > 0) {
      allNews.push(...r.value);
      loaded++;
    }
  });

  // Sort by date
  allNews.sort((a, b) => new Date(b.pubDate) - new Date(a.pubDate));

  // Remove dupes
  const seen = new Set();
  allNews = allNews.filter(n => {
    if (seen.has(n.id)) return false;
    seen.add(n.id);
    return true;
  });

  renderNewsCards(allNews);
  renderRegionsList();
  loadTgFeed();

  document.getElementById("status-rss").textContent = `RSS: ${loaded}/${active.length} источников активно`;
  document.getElementById("status-total").textContent = `Новостей: ${allNews.length}`;
  document.getElementById("update-time").textContent = `Обновлено: ${new Date().toLocaleTimeString("ru-RU")}`;
}

// ═══════════════════════════════════════════════
// RENDER NEWS CARDS
// ═══════════════════════════════════════════════
function renderNewsCards(news) {
  const container = document.getElementById("news-cards");

  let filtered = news;
  if (currentFilter !== "all") {
    filtered = news.filter(n => n.type === currentFilter);
  }

  if (filtered.length === 0) {
    container.innerHTML = `<div class="empty-state"><h3>Нет новостей</h3><p>Нет данных за последние 24 часа.<br>Некоторые источники могут быть недоступны из-за ограничений CORS.<br><br>Попробуйте <strong>обновить</strong> или откройте дашборд на сервере.</p></div>`;
    return;
  }

  container.innerHTML = filtered.slice(0, 60).map(n => `
    <div class="news-card ${n.type}" onclick="openNews('${escHtml(n.link)}')">
      <div class="card-meta">
        <span class="source-badge ${n.type}">${typeLabel(n.type)}</span>
        <span class="card-region">${n.region || "Федеральный"}</span>
        <span class="card-time">${formatTime(n.pubDate)}</span>
      </div>
      <div class="card-title">${escHtml(n.title)}</div>
      <div class="card-source-name">${escHtml(n.source)}</div>
    </div>
  `).join("");
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  renderNewsCards(allNews);
}

function openNews(url) {
  if (url && url !== "#") window.open(url, "_blank", "noopener");
}

function typeLabel(t) {
  return { media: "СМИ", gov: "Госорган", tg: "Telegram" }[t] || t;
}

// ═══════════════════════════════════════════════
// RENDER SOURCES
// ═══════════════════════════════════════════════
function renderSources() {
  const container = document.getElementById("sources-list");
  let lastRegion = null;
  container.innerHTML = "";

  RSS_SOURCES.forEach(source => {
    if (source.region !== lastRegion) {
      lastRegion = source.region;
      const cat = document.createElement("div");
      cat.className = "source-category";
      cat.textContent = source.region;
      container.appendChild(cat);
    }

    const item = document.createElement("div");
    item.className = `source-item ${enabledSources.has(source.id) ? "enabled" : ""}`;
    item.innerHTML = `
      <div class="source-icon ${source.type}">${source.icon}</div>
      <div class="source-info">
        <div class="source-item-name">${source.name}</div>
        <div class="source-item-region">${source.region}</div>
      </div>
      <div class="toggle ${enabledSources.has(source.id) ? "on" : ""}" data-source="${source.id}"></div>
    `;

    item.querySelector(".toggle").addEventListener("click", (e) => {
      e.stopPropagation();
      const id = e.target.dataset.source;
      if (enabledSources.has(id)) {
        enabledSources.delete(id);
        e.target.classList.remove("on");
        item.classList.remove("enabled");
      } else {
        enabledSources.add(id);
        e.target.classList.add("on");
        item.classList.add("enabled");
      }
    });

    container.appendChild(item);
  });
}

// ═══════════════════════════════════════════════
// TG FEED (simulated via RSS where available, otherwise demo)
// ═══════════════════════════════════════════════
function loadTgFeed() {
  const container = document.getElementById("tg-feed");
  // Telegram channels don't have public RSS by default.
  // We show channels list with a note, plus demo/simulated recent posts.
  const simulatedPosts = generateSimulatedTgPosts();
  container.innerHTML = simulatedPosts.map(p => `
    <div class="tg-item" onclick="window.open('https://t.me/${p.username}','_blank','noopener')">
      <div class="tg-channel">
        <div class="tg-avatar">${p.avatar}</div>
        <div class="tg-channel-name">@${p.username}</div>
        <div class="tg-time">${p.time}</div>
      </div>
      <div class="tg-text">${p.text}</div>
    </div>
  `).join("");

  document.getElementById("status-tg").textContent = `TG: ${TG_CHANNELS.length} каналов`;
}

function generateSimulatedTgPosts() {
  // Static representative posts for demonstration (actual TG parsing requires backend)
  return TG_CHANNELS.slice(0, 12).map((ch, i) => ({
    ...ch,
    time: `${Math.floor(i / 3) + 1}ч назад`,
    text: `Последние новости от @${ch.username}. Нажмите для перехода в Telegram-канал. RSS-лента Telegram доступна только через специальный прокси-сервис.`
  }));
}

// ═══════════════════════════════════════════════
// TABS
// ═══════════════════════════════════════════════
function switchTab(name, btn) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.querySelectorAll(".tab-content").forEach(t => t.classList.remove("active"));
  btn.classList.add("active");
  document.getElementById(`tab-${name}`).classList.add("active");
}

// ═══════════════════════════════════════════════
// REFRESH
// ═══════════════════════════════════════════════
function refreshAll() {
  allNews = [];
  document.getElementById("news-cards").innerHTML = `<div class="loading-state"><div class="spinner"></div><div class="loading-text">Обновление...</div></div>`;
  loadAllFeeds();
}

// ═══════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════
function stripHtml(str) {
  return str.replace(/<[^>]+>/g, "").replace(/&amp;/g,"&").replace(/&lt;/g,"<").replace(/&gt;/g,">").replace(/&quot;/g,'"').replace(/&#39;/g,"'").trim();
}

function escHtml(str = "") {
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function formatTime(dateStr) {
  if (!dateStr) return "—";
  const d = new Date(dateStr);
  if (isNaN(d)) return "—";
  const now = new Date();
  const diff = (now - d) / 1000;
  if (diff < 60) return `${Math.floor(diff)}с`;
  if (diff < 3600) return `${Math.floor(diff/60)}м`;
  if (diff < 86400) return `${Math.floor(diff/3600)}ч`;
  return d.toLocaleDateString("ru-RU", { day:"2-digit", month:"2-digit" });
}
